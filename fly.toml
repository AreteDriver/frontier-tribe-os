app = "frontier-tribe-os"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"

[env]
  ENVIRONMENT = "production"
  DATABASE_URL = "sqlite+aiosqlite:///data/tribe.db"
  # EVE_FRONTIER_CALLBACK_URL set via `fly secrets set` — not hardcoded

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = "tribe_data"
  destination = "/data"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
